<!-- @dsCard group="Type" viewport="700x150" subtitle="Roles by weight — SemiBold/Bold for labels, Medium for meta" name="Weight roles" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--background); display: flex; gap: 18px; }
  .cell { flex: 1; border: 1.5px solid var(--border); border-radius: var(--radius-md); background: var(--card); padding: 14px 16px; }
  .k { font-family: var(--font-mono); font-size: 10px; color: var(--subtle-foreground); text-transform: uppercase; letter-spacing: .08em; }
  .hand { font-family: var(--font-sans); }
  .mono { font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="cell">
    <div class="k">bold — labels &amp; headings</div>
    <div class="hand" style="font-size:20px;font-weight:700;margin-top:8px">Proyek</div>
    <div class="hand" style="font-size:14px;color:var(--muted-foreground);margin-top:4px">Semua konten Anda di satu tempat.</div>
  </div>
  <div class="cell">
    <div class="k">medium — meta &amp; counts</div>
    <div class="mono" style="font-size:12px;color:var(--muted-foreground);margin-top:10px">A4 · Private · 10 bulan lalu</div>
    <div class="mono" style="font-size:12px;color:var(--muted-foreground);margin-top:6px">app-shell / navigation-rail</div>
  </div>
</body>
</html>
