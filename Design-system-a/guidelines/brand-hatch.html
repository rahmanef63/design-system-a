<!-- @dsCard group="Brand" viewport="700x180" subtitle="Honest placeholder hatch — the .ds-hatch stand-in for real art" name="Placeholder hatch" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--background); display: flex; gap: 16px; align-items: flex-end; }
  .u { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .ph { border: 1.5px solid var(--border); border-radius: var(--radius-md); display: grid; place-items: center; color: var(--subtle-foreground); font-family: var(--font-mono); font-size: 10px; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="u"><div class="ph ds-hatch" style="width:80px;height:80px">[ 1:1 ]</div><span class="n">1:1</span></div>
  <div class="u"><div class="ph ds-hatch" style="width:80px;height:100px">[ 4:5 ]</div><span class="n">4:5</span></div>
  <div class="u"><div class="ph ds-hatch" style="width:120px;height:90px">[ 4:3 ]</div><span class="n">4:3</span></div>
  <div class="u"><div class="ph ds-hatch" style="width:74px;height:104px">[ poster ]</div><span class="n">poster</span></div>
  <div class="u"><div class="ph ds-hatch" style="width:150px;height:84px">[ preview ]</div><span class="n">16:9</span></div>
</body>
</html>
