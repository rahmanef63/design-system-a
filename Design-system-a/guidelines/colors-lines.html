<!-- @dsCard group="Colors" viewport="700x140" subtitle="Borders — 1.5px default, 2px emphasis / hover" name="Lines" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--background); display: flex; gap: 16px; align-items: stretch; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .box { flex: 1; min-height: 60px; border-radius: var(--radius-md); background: var(--card); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); line-height: 1.45; }
  .lbl b { display: block; color: var(--foreground); font-family: var(--font-sans); font-size: 14px; }
</style>
</head>
<body>
  <div class="sw"><div class="box" style="border:1.5px solid var(--border)"></div><span class="lbl"><b>--border</b>#DBD7CB · 1.5px default</span></div>
  <div class="sw"><div class="box" style="border:2px solid var(--border-strong)"></div><span class="lbl"><b>--border-strong</b>#1A1915 · 2px emphasis</span></div>
</body>
</html>
