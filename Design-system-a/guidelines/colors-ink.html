<!-- @dsCard group="Colors" viewport="700x150" subtitle="Ink ramp — primary text, secondary meta, muted placeholder" name="Ink" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--card); display: flex; gap: 14px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 66px; border-radius: var(--radius-md); border: 1.5px solid var(--border); display: grid; place-items: center; font-family: var(--font-sans); font-size: 22px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); line-height: 1.45; }
  .lbl b { display: block; color: var(--foreground); font-family: var(--font-sans); font-size: 14px; }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="background:var(--foreground);color:var(--card)">Aa</div><span class="lbl"><b>--foreground</b>#1A1915 · primary</span></div>
  <div class="sw"><div class="chip" style="background:var(--muted);color:var(--muted-foreground)">Aa</div><span class="lbl"><b>--muted-foreground</b>#6B665C · secondary</span></div>
  <div class="sw"><div class="chip" style="background:var(--muted);color:var(--subtle-foreground)">Aa</div><span class="lbl"><b>--subtle-foreground</b>#9B968A · muted / disabled</span></div>
</body>
</html>
