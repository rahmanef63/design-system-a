<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Elevation — flat by default; shadow only on overlays" name="Elevation" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--background); display: flex; gap: 22px; align-items: center; }
  .u { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 100%; height: 62px; border-radius: var(--radius-md); background: var(--card); border: 1.5px solid var(--border); display: grid; place-items: center; font-family: var(--font-sans); font-size: 14px; color: var(--muted-foreground); }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); text-align: center; }
</style>
</head>
<body>
  <div class="u"><div class="box" style="box-shadow:none">flat</div><span class="n">default · no shadow</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--elevation-overlay)">popover</div><span class="n">--elevation-overlay</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--elevation-modal)">modal</div><span class="n">--elevation-modal</span></div>
</body>
</html>
