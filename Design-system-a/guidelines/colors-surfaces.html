<!-- @dsCard group="Colors" viewport="700x150" subtitle="App surfaces — paper, raised, inset, placeholder fill" name="Surfaces" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--background); display: flex; gap: 14px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 66px; border-radius: var(--radius-md); border: 1.5px solid var(--border); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); line-height: 1.45; }
  .lbl b { display: block; color: var(--foreground); font-family: var(--font-sans); font-size: 14px; }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="background:var(--background)"></div><span class="lbl"><b>--background</b>#F0EEE6 · app bg</span></div>
  <div class="sw"><div class="chip" style="background:var(--card)"></div><span class="lbl"><b>--card</b>#FAF9F5 · cards / menus</span></div>
  <div class="sw"><div class="chip" style="background:var(--muted)"></div><span class="lbl"><b>--muted</b>#E7E4D9 · inset / hover</span></div>
  <div class="sw"><div class="chip" style="background:var(--accent)"></div><span class="lbl"><b>--accent</b>#EAE6DC · subtle accent</span></div>
</body>
</html>
