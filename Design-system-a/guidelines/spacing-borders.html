<!-- @dsCard group="Spacing" viewport="700x150" subtitle="Borders & focus — 1.5px default, 2px hover, 2px accent ring" name="Borders & focus" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--background); display: flex; gap: 16px; align-items: center; }
  .u { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 100%; height: 58px; border-radius: var(--radius-md); background: var(--card); display: grid; place-items: center; font-family: var(--font-sans); font-size: 14px; color: var(--muted-foreground); }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="u"><div class="box" style="border:1.5px solid var(--border)">default</div><span class="n">1.5px --border</span></div>
  <div class="u"><div class="box" style="border:2px solid var(--border-strong)">hover</div><span class="n">2px --border-strong</span></div>
  <div class="u"><div class="box" style="border:1.5px solid var(--border);box-shadow:var(--focus-ring)">focus</div><span class="n">--focus-ring</span></div>
</body>
</html>
