<!-- @dsCard group="Spacing" viewport="700x150" subtitle="Spacing scale — 4 · 8 · 12 · 16 · 24 · 32 · 48 · 64" name="Scale" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--background); display: flex; align-items: flex-end; gap: 14px; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--primary); border-radius: var(--radius-sm); width: 100%; }
  .u > .cell { width: 100%; display: flex; justify-content: center; }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="u"><div class="cell"><div class="bar" style="height:4px;width:4px"></div></div><span class="n">4</span></div>
  <div class="u"><div class="cell"><div class="bar" style="height:8px;width:8px"></div></div><span class="n">8</span></div>
  <div class="u"><div class="cell"><div class="bar" style="height:12px;width:12px"></div></div><span class="n">12</span></div>
  <div class="u"><div class="cell"><div class="bar" style="height:16px;width:16px"></div></div><span class="n">16</span></div>
  <div class="u"><div class="cell"><div class="bar" style="height:24px;width:24px"></div></div><span class="n">24</span></div>
  <div class="u"><div class="cell"><div class="bar" style="height:32px;width:32px"></div></div><span class="n">32</span></div>
  <div class="u"><div class="cell"><div class="bar" style="height:48px;width:48px"></div></div><span class="n">48</span></div>
  <div class="u"><div class="cell"><div class="bar" style="height:64px;width:64px"></div></div><span class="n">64</span></div>
</body>
</html>
