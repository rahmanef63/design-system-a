<!-- @dsCard group="Colors" viewport="700x160" subtitle="One accent (Claude coral) + annotation highlight — the only hues" name="Accent & signal" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--background); display: flex; gap: 14px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 66px; border-radius: var(--radius-md); border: 1.5px solid var(--border); display: grid; place-items: center; font-family: var(--font-sans); font-weight: 700; font-size: 15px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); line-height: 1.45; }
  .lbl b { display: block; color: var(--foreground); font-family: var(--font-sans); font-size: 14px; }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="background:var(--primary);color:var(--primary-foreground);border:0">Buat</div><span class="lbl"><b>--primary</b>#D97757 · interactive</span></div>
  <div class="sw"><div class="chip" style="background:var(--primary-soft);color:var(--primary)">active</div><span class="lbl"><b>--primary-soft</b>14% · active tint</span></div>
  <div class="sw"><div class="chip" style="background:var(--highlight);color:var(--foreground)">★ Baru</div><span class="lbl"><b>--highlight</b>#EFD4AC · annotation</span></div>
</body>
</html>
