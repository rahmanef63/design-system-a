<!-- @dsCard group="Type" viewport="700x200" subtitle="One family — Plus Jakarta Sans, differentiated by weight" name="Family & weights" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--background); display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--border); padding-bottom: 11px; }
  .row:last-child { border-bottom: 0; }
  .tag { flex: none; width: 132px; font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); }
  .tag b { display: block; color: var(--foreground); font-size: 14px; font-weight: 700; }
  .spec { font-size: 24px; color: var(--foreground); }
</style>
</head>
<body>
  <div class="row"><span class="tag"><b>800 · Black</b>PageTitle</span><span class="spec" style="font-weight:800">Semua proyek</span></div>
  <div class="row"><span class="tag"><b>700 · Bold</b>headings / labels</span><span class="spec" style="font-weight:700">Mau desain apa hari ini?</span></div>
  <div class="row"><span class="tag"><b>600 · SemiBold</b>buttons / nav</span><span class="spec" style="font-weight:600;font-size:20px">Coba Pro gratis</span></div>
  <div class="row"><span class="tag"><b>500 · Medium</b>meta / counts</span><span class="spec" style="font-weight:500;font-size:15px;color:var(--muted-foreground)">A4 · Private · 10 bulan lalu</span></div>
  <div class="row"><span class="tag"><b>400 · Regular</b>body</span><span class="spec" style="font-weight:400;font-size:15px">Cari desain, folder, dan unggahan</span></div>
</body>
</html>
