<!-- @dsCard group="Components" viewport="760x460" subtitle="AppShell · NavigationRail · SecondarySidebar · MainRegion · RightPanel" name="Layout & Structure" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; height: 100%; background: var(--background); }
  .fallback { font-family: var(--font-mono); font-size: 12px; color: var(--muted-foreground); border: 1.5px dashed var(--border); border-radius: 10px; padding: 16px; margin: 22px; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
function findDS() {
  const known = ["AppShell","NavigationRail","SecondarySidebar","MainRegion","RightPanel","NavItem","CommandSearch","CloseButton","Button"];
  const cands = [window];
  for (const k of Object.getOwnPropertyNames(window)) { let v; try { v = window[k]; } catch (e) { continue; } if (v && typeof v === "object") cands.push(v); }
  let best = {}, score = -1;
  for (const c of cands) { let s = 0; for (const n of known) if (typeof c[n] === "function") s++; if (s > score) { score = s; best = c; } }
  return best;
}
const DS = findDS();
const { AppShell, NavigationRail, SecondarySidebar, MainRegion, RightPanel, NavItem, CommandSearch } = DS;
const root = ReactDOM.createRoot(document.getElementById("root"));

function Demo() {
  return (
    <AppShell
      rail={<NavigationRail
        brand={{ name: "Rupa", initial: "R" }}
        items={[
          { key: "c", icon: "+", label: "Buat", accent: true },
          { key: "h", icon: "B", label: "Beranda", active: true },
          { key: "p", icon: "P", label: "Proyek" },
          { key: "t", icon: "T", label: "Template" },
          { key: "m", icon: "M", label: "Merek", crown: true },
        ]}
        dock={[
          { key: "n", icon: "◻", label: "Notifikasi" },
          { key: "u", icon: "RF", label: "Akun", avatar: true },
        ]}
      />}
      panel={<RightPanel onClose={() => {}}>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", padding: "20px 26px" }}>
          <div style={{ width: 54, height: 54, borderRadius: 16, border: "1.5px solid var(--border)", display: "grid", placeItems: "center", font: "700 15px var(--font-mono)", color: "var(--subtle-foreground)", marginBottom: 18 }}>AI</div>
          <h3 style={{ font: "700 20px var(--font-sans)", margin: "0 0 8px" }}>Bantuan Rupa</h3>
          <p style={{ font: "400 13px var(--font-sans)", color: "var(--muted-foreground)", margin: 0 }}>Ajukan pertanyaan. Temukan jawaban.</p>
        </div>
      </RightPanel>}
    >
      <SecondarySidebar>
        <NavItem orientation="horizontal" icon="◦" label="Semua aset" active />
        <NavItem orientation="horizontal" icon="◦" label="Logo" />
        <NavItem orientation="horizontal" icon="◦" label="Warna" />
      </SecondarySidebar>
      <MainRegion>
        <section style={{ padding: "40px 32px", textAlign: "center", background: "linear-gradient(180deg, var(--primary-soft), transparent 88%)" }}>
          <h1 style={{ font: "700 30px var(--font-sans)", margin: "0 0 18px" }}>Mau desain apa hari ini?</h1>
          <div style={{ maxWidth: 460, margin: "0 auto" }}><CommandSearch placeholder="Cari desain, folder, dan unggahan" /></div>
        </section>
      </MainRegion>
    </AppShell>
  );
}

if (typeof AppShell === "function") root.render(<Demo />);
else document.getElementById("root").innerHTML = '<div class="fallback">Components render once the design-system bundle is compiled (_ds_bundle.js).</div>';
</script>
</body>
</html>
